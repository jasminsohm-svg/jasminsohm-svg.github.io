<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>(Un)gezähmt – Was ist passiert?</title>
  <link rel="stylesheet" href="https://use.typekit.net/mqg6bai.css">
  <link rel="stylesheet" href="style.css">
  <style>

    .page--meldetool {
      min-height: 100dvh;
      padding-bottom: 96px;
    }

    .page--meldetool main {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-top: 24px;
    }

    /* ── LEISTE ───────────────────────────────────────────── */
    .melde-leiste {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .melde-leiste__nav {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .melde-dots {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .melde-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .melde-dot--active {
      background: #000;
    }

    /* ── FRAGE ────────────────────────────────────────────── */
    .melde-h1 {
      font-size: 26px;
      font-weight: 400;
      line-height: 32px;
      color: #000;
      padding: 0 16px;
    }

    /* ── INPUT BLOCK ──────────────────────────────────────── */
    .melde-input-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px;
      width: 100%;
      box-sizing: border-box;
    }

    /* pre-selected option (read-only row) */
    .melde-option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 8px 0;
    }

    .melde-option-row__label {
      font-size: 16px;
      font-weight: 300;
      line-height: 20px;
      color: #000;
      flex: 1;
    }

    .melde-option-row__circle {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid #E6301E;
      background: #E6301E;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .melde-option-row__circle::after {
      content: '';
      display: block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
    }

    /* textarea */
    .melde-textarea {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .melde-textarea textarea {
      width: 100%;
      height: 84px;
      border: 1px solid #5E5E5E;
      border-radius: 6px;
      background: transparent;
      resize: none;
      font-family: "acumin-pro", sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: #000;
      padding: 10px 12px;
      box-sizing: border-box;
      outline: none;
      line-height: 20px;
    }

    .melde-textarea textarea:focus {
      border-color: #E6301E;
    }

    .melde-textarea__hint {
      font-size: 14px;
      font-weight: 300;
      line-height: 1;
      color: #000;
    }

    /* ── BUTTON ───────────────────────────────────────────── */
    .melde-btn-wrap {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: var(--page-w);
      padding: 10px 16px 20px;
      box-sizing: border-box;
      background: var(--color-bg);
    }

    .melde-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 56px;
      background: #E6301E;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      color: #fff;
      text-decoration: none;
      box-sizing: border-box;
      transition: background 0.1s ease;
    }

    .melde-btn:active {
      background: #8A1C12;
    }

  </style>
</head>
<body>

<!-- ─── MOBILE MENU OVERLAY ─────────────────────────────── -->
<div class="menu-overlay" id="menuOverlay" role="dialog" aria-modal="true" aria-label="Navigation">
  <button class="menu-overlay__close" id="menuClose" aria-label="Menü schließen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <line x1="4" y1="4" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
      <line x1="20" y1="4" x2="4" y2="20" stroke="#fff" stroke-width="1.5"/>
    </svg>
  </button>
  <nav class="menu-overlay__nav">
    <a href="index.html" class="menu-overlay__item">Home</a>
    <a href="hinsehen.html" class="menu-overlay__item">Hinsehen</a>
    <a href="handeln.html" class="menu-overlay__item is-active">Handeln</a>
    <a href="hilfe.html" class="menu-overlay__item">Hilfe &amp; Anlaufstellen</a>
    <a href="hintergrund.html" class="menu-overlay__item">Hintergrund</a>
  </nav>
</div>

<!-- ─── PAGE ─────────────────────────────────────────────── -->
<div class="page page--meldetool">

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__inner">
      <button class="navbar__menu-btn" id="menuOpen" aria-label="Menü öffnen" aria-expanded="false" aria-controls="menuOverlay">
        <span class="hamburger" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span class="navbar__menu-label">Menü</span>
      </button>
      <a href="index.html" class="navbar__logo" aria-label="(Un)gezähmt – Startseite">
        <img src="./logo.png" alt="(Un)gezähmt" style="height:30px;width:auto;display:block;" />
      </a>
    </div>
  </header>

  <main id="main-content">

    <!-- ── LEISTE ─────────────────────────────────────────── -->
    <div class="melde-leiste">
      <a href="handeln-3b.html" class="melde-leiste__nav" aria-label="Zurück">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M20 12H4M4 12L10 6M4 12L10 18" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <div class="melde-dots" aria-label="Schritt 1 von 4">
        <div class="melde-dot melde-dot--active"></div>
        <div class="melde-dot"></div>
        <div class="melde-dot"></div>
        <div class="melde-dot"></div>
      </div>
      <a href="#" onclick="history.back(); return false;" class="melde-leiste__nav" aria-label="Schließen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <line x1="4" y1="4" x2="20" y2="20" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="4" y2="20" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <!-- ── FRAGE ──────────────────────────────────────────── -->
    <h1 class="melde-h1">Was ist passiert?</h1>

    <!-- ── INPUT BLOCK ────────────────────────────────────── -->
    <div class="melde-input-block">

      <!-- vorausgewählte Option -->
      <div class="melde-option-row">
        <span class="melde-option-row__label">Belästigung mit Worten</span>
        <span class="melde-option-row__circle" aria-hidden="true"></span>
      </div>

      <!-- Textarea -->
      <div class="melde-textarea">
        <textarea placeholder="" aria-label="Was wurde gesagt?"></textarea>
        <span class="melde-textarea__hint">Was wurde gesagt?</span>
      </div>

    </div>

  </main>

  <!-- ── BUTTON ──────────────────────────────────────────── -->
  <div class="melde-btn-wrap">
    <a href="handeln-3d.html" class="melde-btn">Weiter</a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
