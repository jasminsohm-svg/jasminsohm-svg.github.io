<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>(Un)gezähmt – Danke für deine Meldung!</title>
  <link rel="stylesheet" href="https://use.typekit.net/mqg6bai.css">
  <link rel="stylesheet" href="style.css">
  <style>

    .page--meldetool {
      min-height: max(var(--page-min-h), 100dvh);
    }

    .page--meldetool main {
      display: flex;
      flex-direction: column;
      gap: 40px;
      padding-top: 24px;
    }

    /* ── SCHLIESSEN ROW ───────────────────────────────────── */
    .melde-close-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .melde-close-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      text-decoration: none;
      flex-shrink: 0;
    }

    /* ── EINFÜHRUNG ───────────────────────────────────────── */
    .melde-intro {
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
    }

    .melde-h1 {
      font-size: 26px;
      font-weight: 400;
      line-height: 32px;
      color: #000;
      padding: 0 16px;
    }

    .melde-infotext {
      display: flex;
      justify-content: flex-end;
      padding: 0 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .melde-infotext__inner {
      width: 259px;
      font-size: 16px;
      font-weight: 300;
      line-height: 20px;
      color: #000;
      letter-spacing: 0.02em;
    }

    /* ── LINKS ────────────────────────────────────────────── */
    .melde-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-end;
      padding: 0 16px;
      width: 100%;
      box-sizing: border-box;
    }

    .melde-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid #E6301E;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      color: #000;
      text-decoration: none;
      white-space: nowrap;
    }

    .melde-link svg {
      flex-shrink: 0;
    }

  </style>
</head>
<body>

<!-- ─── MOBILE MENU OVERLAY ─────────────────────────────── -->
<div class="menu-overlay" id="menuOverlay" role="dialog" aria-modal="true" aria-label="Navigation">
  <button class="menu-overlay__close" id="menuClose" aria-label="Menü schließen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <line x1="4" y1="4" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
      <line x1="20" y1="4" x2="4" y2="20" stroke="#fff" stroke-width="1.5"/>
    </svg>
  </button>
  <nav class="menu-overlay__nav">
    <a href="index.html" class="menu-overlay__item">Home</a>
    <a href="hinsehen.html" class="menu-overlay__item">Hinsehen</a>
    <a href="handeln.html" class="menu-overlay__item">Handeln</a>
    <a href="hilfe.html" class="menu-overlay__item">Soforthilfe</a>
    <a href="handeln-3.html" class="menu-overlay__item is-active">Catcalling melden</a>
    <a href="hintergrund.html" class="menu-overlay__item">Hintergrund</a>
  </nav>
</div>

<!-- ─── PAGE ─────────────────────────────────────────────── -->
<div class="page page--meldetool">

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__inner">
      <button class="navbar__menu-btn" id="menuOpen" aria-label="Menü öffnen" aria-expanded="false" aria-controls="menuOverlay">
        <span class="hamburger" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        <span class="navbar__menu-label">Menü</span>
      </button>
      <a href="index.html" class="navbar__logo" aria-label="(Un)gezähmt – Startseite">
        <img src="./logo.png" alt="(Un)gezähmt" style="height:33px;width:auto;display:block;" />
      </a>
    </div>
  </header>

  <main id="main-content">

    <!-- ── SCHLIESSEN ─────────────────────────────────────── -->
    <div class="melde-close-row">
      <a href="#" onclick="window.location.href = sessionStorage.getItem('meldeEntryUrl') || 'index.html'; return false;" class="melde-close-btn" aria-label="Schließen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <line x1="4" y1="4" x2="20" y2="20" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="4" x2="4" y2="20" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <!-- ── INHALT ─────────────────────────────────────────── -->
    <div class="melde-intro">
      <h1 class="melde-h1">Danke für deine Meldung!</h1>
      <div class="melde-infotext">
        <p class="melde-infotext__inner">Was du erlebt hast, ist niemals deine Schuld. Der Übergriff wird nun sichtbar gemacht.</p>
      </div>
    </div>

    <!-- ── LINKS ──────────────────────────────────────────── -->
    <div class="melde-links">
      <a href="hilfe.html" class="melde-link">
        Soforthilfe
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2.917 2.917H11.083M11.083 2.917V11.083M11.083 2.917L2.333 11.667" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="handeln-2.html" class="melde-link">
        So kannst du helfen
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2.917 2.917H11.083M11.083 2.917V11.083M11.083 2.917L2.333 11.667" stroke="#E6301E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
